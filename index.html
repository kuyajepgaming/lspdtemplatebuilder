<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="LSPD Dispatch Builder">

    <title>LSPD Dispatch Builder</title>

    <link rel="icon" type="image/webp" href="assets/logo.webp">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <!-- ==========================================
             HEADER
        =========================================== -->

        <header>

            <img
                src="assets/logo.webp"
                alt="Los Santos Police Department"
                class="logo">

            <div class="header-text">

                <h1>Los Santos Police Department</h1>

                <p>Dispatch Builder</p>

            </div>

        </header>

        <!-- ==========================================
             WORKFLOW
        =========================================== -->

        <section class="card">

            <div id="workflowContainer">

                <!--
                    Generated dynamically by ui.js

                    Category
                    ↓
                    Incident Type
                    ↓
                    Location
                    ↓
                    Status
                -->

            </div>

        </section>

        <!-- ==========================================
             OUTPUT
        =========================================== -->

        <section class="output">

            <div class="output-header">

                <h2>Dispatch Preview</h2>

                <button
                    id="copyBtn"
                    type="button">

                    Copy

                </button>

            </div>

            <textarea

                id="result"

                readonly

                spellcheck="false"

                placeholder="Your generated dispatch will appear here automatically..."

            ></textarea>

        </section>

    </div>

    <!-- ==========================================
         JAVASCRIPT
    =========================================== -->

    <script src="js/database.js"></script>

    <script src="js/utils.js"></script>
    <script src="js/templateEngine.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/clipboard.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
